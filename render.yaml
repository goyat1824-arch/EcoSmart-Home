services:
  - type: web
    name: ecosmart-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python seed_data.py
      python -m app.ml.train
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: '["https://YOUR_CLOUDFLARE_DOMAIN.pages.dev","http://localhost:4200"]'
      - key: AUTO_SEED
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.6"
